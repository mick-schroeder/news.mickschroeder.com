name: Refresh Aggregator Sources

on:
  schedule:
    - cron: '17 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run sources:refresh
      - run: npm run test:sources
      - name: Commit refreshed sources
        run: |
          if git diff --quiet -- src/data/sources.json; then
            echo "No source changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/sources.json
          git commit -m "Refresh aggregator sources"
          git push
